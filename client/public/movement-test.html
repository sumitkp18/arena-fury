<!DOCTYPE html>
<html>
<head>
  <title>Movement Test - No Networking</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #info {
      position: fixed; top: 8px; left: 8px; color: #0f0;
      font: bold 14px monospace; background: rgba(0,0,0,0.7);
      padding: 4px 8px; border-radius: 4px; z-index: 9999;
    }
  </style>
</head>
<body>
<div id="info">Press WASD to move. Watch for stutter.</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

// ─── Setup ────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020205);
scene.fog = new THREE.FogExp2(0x050515, 0.015);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(1);
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ─── Grid floor ────────────────────────────
const gridHelper = new THREE.GridHelper(60, 60, 0x00ffcc, 0x003322);
gridHelper.position.y = 0;
scene.add(gridHelper);

// ─── Player sphere ────────────────────────
const playerGeo = new THREE.SphereGeometry(1.5, 32, 32);
const playerMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc });
const playerMesh = new THREE.Mesh(playerGeo, playerMat);
playerMesh.position.y = 1.5;
scene.add(playerMesh);

// ─── Lighting ─────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);

// ─── Input ────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─── Camera offset (fixed orbit position) ──
const CAM_DIST = 40;
const CAM_ELEV = Math.PI / 4; // 45 degrees
const camOffsetX = 0;
const camOffsetY = CAM_DIST * Math.cos(CAM_ELEV);
const camOffsetZ = CAM_DIST * Math.sin(CAM_ELEV);

// ─── State ────────────────────────────────
const SPEED = 12;
let px = 0, pz = 0;

// FPS counter
let frameCount = 0, fpsTime = 0, fps = 0;
const infoEl = document.getElementById('info');

// ─── Game loop ────────────────────────────
let lastTime = performance.now();

renderer.setAnimationLoop(function loop(time) {
  let dt = time - lastTime;
  lastTime = time;
  if (dt > 100) dt = 100;
  if (dt <= 0) dt = 1;

  // FPS
  frameCount++;
  fpsTime += dt;
  if (fpsTime >= 500) {
    fps = Math.round(frameCount / (fpsTime / 1000));
    frameCount = 0;
    fpsTime = 0;
    infoEl.textContent = `FPS: ${fps} | dt: ${dt.toFixed(1)}ms | WASD to move`;
  }

  // Input
  let dx = 0, dz = 0;
  if (keys['KeyW'] || keys['ArrowUp']) dz = -1;
  if (keys['KeyS'] || keys['ArrowDown']) dz = 1;
  if (keys['KeyA'] || keys['ArrowLeft']) dx = -1;
  if (keys['KeyD'] || keys['ArrowRight']) dx = 1;
  
  // Normalize diagonal
  if (dx !== 0 && dz !== 0) {
    const len = Math.sqrt(dx * dx + dz * dz);
    dx /= len;
    dz /= len;
  }

  // Move player
  const dtSec = dt / 1000;
  px += dx * SPEED * dtSec;
  pz += dz * SPEED * dtSec;

  // Clamp
  px = Math.max(-30, Math.min(30, px));
  pz = Math.max(-30, Math.min(30, pz));

  // Update mesh
  playerMesh.position.x = px;
  playerMesh.position.z = pz;

  // Camera follows rigidly
  camera.position.set(px + camOffsetX, camOffsetY, pz + camOffsetZ);
  camera.lookAt(px, 0, pz);

  renderer.render(scene, camera);
});
</script>
</body>
</html>
